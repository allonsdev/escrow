<!DOCTYPE html>
<html>
<head>
  <title>Raise Dispute</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

  <h2>Raise Dispute</h2>

  <form method="post">
    {% csrf_token %}
    <label>Reason</label>
    <textarea name="reason" class="form-control" required></textarea><br>

    <button class="btn btn-danger">Submit Dispute</button>
  </form>

</div>

</body>
</html>
