<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raise Dispute</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Segoe UI', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      background: #131921;
    }
    .navbar .navbar-brand,
    .navbar .nav-link {
      color: white !important;
    }
    .navbar .nav-link:hover {
      color: #ffd814 !important;
    }
    .search-btn {
      background: #ffd814;
      border: none;
    }
    .search-btn:hover {
      background: #f7ca00;
    }

    /* CARD */
    .dispute-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      background: #ffffff;
      padding: 40px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .dispute-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    /* Header */
    .page-header {
      font-weight: 700;
      color: #d9534f;
    }

    /* Warning Box */
    .warning-box {
      background: #fff3cd;
      border-radius: 15px;
      padding: 18px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Textarea */
    textarea {
      border-radius: 15px;
      padding: 18px;
      resize: none;
      font-size: 1rem;
    }

    /* Buttons */
    .btn-submit {
      border-radius: 50px;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-submit:hover {
      opacity: 0.95;
    }
    .btn-danger {
      background: #d9534f;
      border: none;
    }
    .btn-danger:hover {
      background: #c9302c;
    }
    .btn-cancel {
      border-radius: 50px;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .dispute-card {
        padding: 25px;
      }
      .btn-submit, .btn-cancel {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/">MarketPro</a>
    <form class="d-flex flex-grow-1 mx-4" method="GET" action="/">
      <div class="input-group">
        <input name="q" class="form-control" placeholder="Search products...">
        <button class="btn search-btn">Search</button>
      </div>
    </form>
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="#">Account</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-cart"></i></a></li>
    </ul>
  </div>
</nav>

<div class="container py-5">

  <!-- Header -->
  <div class="text-center mb-5">
    <h2 class="fw-bold page-header">
      <i class="bi bi-exclamation-triangle"></i> Raise a Dispute
    </h2>
    <p class="text-muted">Submit a formal dispute for review by platform administrators.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card dispute-card">

        <!-- Warning Box -->
        <div class="warning-box mb-4">
          <i class="bi bi-info-circle-fill text-warning fs-5"></i>
          <span>Please provide a clear and detailed explanation. False claims may lead to account restrictions.</span>
        </div>

        <!-- Form -->
        <form method="post">
          {% csrf_token %}

          <div class="mb-4">
            <label class="form-label fw-semibold">Reason for Dispute</label>
            <textarea name="reason" class="form-control" rows="6"
                      placeholder="Describe the issue (e.g., item not as described, damaged goods, non-delivery, etc.)" required></textarea>
          </div>

          <!-- Action Buttons -->
          <div class="d-flex flex-column flex-md-row gap-3">
            <button type="submit" class="btn btn-danger btn-submit shadow">
              <i class="bi bi-send"></i> Submit Dispute
            </button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-cancel">
              Cancel
            </a>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
