<!DOCTYPE html>
<html>
<head>
  <title>{{ product.name }}</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

  <h2>{{ product.name }}</h2>
  <p>{{ product.description }}</p>

  <p><strong>Price:</strong> {{ product.price }} {{ product.currency }}</p>
  <p><strong>Seller:</strong> {{ product.seller.username }}</p>
  <p><strong>Available:</strong> {{ product.quantity_available }}</p>
  <p><strong>Condition:</strong> {{ product.condition }}</p>

  <form method="post" action="{% url 'checkout' product.id %}">
    {% csrf_token %}
    <button class="btn btn-success">Buy Now</button>
  </form>

</div>

</body>
</html>
